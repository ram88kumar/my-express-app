on:
    push:
      branches: [ main ]
    pull_request:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v6.4.0
              with:    # Version Spec of the version to use. Examples: 12.x, 10.15.1, >=10.15.0.
                node-version: 20

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test         